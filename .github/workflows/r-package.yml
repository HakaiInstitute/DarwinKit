name: R package

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: packages/r
          extra-packages: |
            any::testthat
            any::withr
      - name: Build dwkt binary
        # Package-level task (not the root one): compiles against the committed
        # dwcSchema.json, skipping the network `import` step so R CI doesn't
        # depend on external schema/checklist URLs.
        run: deno task --cwd packages/cli compile:linux
      - name: Run R tests against the binary
        env:
          DARWINKIT_BIN: ${{ github.workspace }}/packages/cli/dist/dwkt-linux
        run: deno task test:r
