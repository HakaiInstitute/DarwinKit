name: Code Quality

on:
  pull_request:
    branches:
      - main
      - effect-workspaces
  push:
    branches:
      - main

jobs:
  code-quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Verify Deno installation
        run: deno --version

      - name: Run linter
        run: deno lint

      - name: Run formatter check
        run: deno fmt --check

      - name: Type check packages
        run: |
          deno check

      - name: Generate Darwin Core schema
        run: deno test test/schema-generation.test.ts --allow-all

      - name: Run domain tests
        id: domain
        run: deno test packages/domain/ --allow-all --junit-path=./reports/report1.xml

      - name: Run core tests
        id: core
        run: deno test packages/core/ --allow-all --junit-path=./reports/report2.xml

      - name: Run integration tests
        id: integration
        run: |
          deno test test/example-config.test.ts --allow-all --junit-path=./reports/report3.xml
          deno test test/obis-profile.test.ts --allow-all --junit-path=./reports/report4.xml
          deno test test/schema-generation.test.ts --allow-all --junit-path=./reports/report5.xml

      - name: Test Report
        uses: dorny/test-reporter@v2
        if:
          steps.domain.outcome == 'success' || steps.domain.outcome == 'failure'
          || steps.core.outcome == 'success' || steps.core.outcome == 'failure'
          || steps.integration.outcome == 'success' || steps.integration.outcome == 'failure'
        with:
          name: Deno Tests
          path: ./reports/*.xml
          reporter: jest-junit

      - name: Test summary
        if: always()
        run: echo "✅ All code quality checks and tests completed"
