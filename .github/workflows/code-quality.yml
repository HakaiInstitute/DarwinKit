name: Code Quality

on:
  pull_request:
    branches:
      - main
      - effect-workspaces

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Run linter
        run: deno lint

      - name: Check formatting
        run: deno fmt --check

      - name: Type check domain package
        run: deno check packages/domain/mod.ts

      - name: Type check core package
        run: deno check packages/core/mod.ts

      - name: Type check all TypeScript files
        run: |
          find packages -name "*.ts" -type f | while read file; do
            echo "Checking $file"
            deno check "$file" || exit 1
          done
