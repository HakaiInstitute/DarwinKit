name: Code Quality

on:
  pull_request:
    branches:
      - main
      - effect-workspaces
  push:
    branches:
      - main

jobs:
  code-quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Initialize rs_gbif submodule
        run: git submodule update --init --depth=1 external/rs_gbif

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          # Pinned to 2.9.1: Deno 2.9.2+ drains Node-API finalizers at test
          # worker shutdown (denoland/deno#35695), which segfaults
          # @duckdb/node-api after tests pass. Revert to v2.x once fixed upstream.
          deno-version: v2.9.1
          cache: true

      - name: Verify Deno installation
        run: deno --version

      - name: Run linter
        run: deno lint

      - name: Run formatter check
        run: deno fmt --check

      - name: ShellCheck install.sh
        run: shellcheck install.sh

      - name: Test install script
        run: deno test test/install.test.ts --allow-run --allow-read --allow-write --allow-env

      - name: Type check packages
        run: |
          deno check

      - name: Generate and validate Darwin Core schema
        run: deno test test/schema-generation.test.ts --allow-all

      - name: Run domain tests
        id: domain
        run: deno test packages/domain/ --allow-all --junit-path=./reports/report1.xml

      - name: Run core tests
        id: core
        run: deno test packages/core/ --allow-all --junit-path=./reports/report2.xml

      - name: Run integration tests
        id: integration
        run: |
          deno test test/example-config.test.ts --allow-all --junit-path=./reports/report3.xml
          deno test test/obis-profile.test.ts --allow-all --junit-path=./reports/report4.xml
          deno test test/schema-generation.test.ts --allow-all --junit-path=./reports/report5.xml

      - name: Test Report
        uses: dorny/test-reporter@v3
        if:
          steps.domain.outcome == 'success' || steps.domain.outcome == 'failure'
          || steps.core.outcome == 'success' || steps.core.outcome == 'failure'
          || steps.integration.outcome == 'success' || steps.integration.outcome == 'failure'
        with:
          name: Deno Tests
          path: ./reports/*.xml
          reporter: jest-junit

      - name: Test summary
        if: always()
        run: echo "✅ All code quality checks and tests completed"
