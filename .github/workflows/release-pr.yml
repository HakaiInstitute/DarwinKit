name: release-pr
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
      - name: Compute next version
        id: bump
        run: |
          # Capture git-cliff's bumped version from stdout directly. The
          # orhun/git-cliff-action `version` output is the latest RELEASE, not
          # the --bumped-version value (git-cliff prints that to stdout), and the
          # action's jq post-processing errors on that plain string — leaving the
          # output empty and silently skipping every release. Read stdout instead.
          v=$(docker run --rm -v "$PWD":/app -w /app ghcr.io/orhun/git-cliff/git-cliff:2.13.1 --bumped-version 2>/dev/null || true)
          echo "git-cliff --bumped-version -> ${v:-<empty>}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Read current tag
        id: current
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)" >> "$GITHUB_OUTPUT"
      - name: Normalize next version
        id: next
        env:
          BUMPED: ${{ steps.bump.outputs.version }}
          CURRENT: ${{ steps.current.outputs.tag }}
        run: |
          # git-cliff emits an empty/invalid value when there is nothing to
          # release; fall back to the current tag so the guards below no-op
          # instead of failing the job.
          NEXT="$BUMPED"
          case "$NEXT" in
            v[0-9]*) ;;
            *) NEXT="$CURRENT" ;;
          esac
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Generate changelog + sync deno.json
        if: steps.next.outputs.version != steps.current.outputs.tag
        env:
          NEXT: ${{ steps.next.outputs.version }}
        run: |
          docker run --rm -v "$PWD":/app -w /app ghcr.io/orhun/git-cliff/git-cliff:2.13.1 --bump -o CHANGELOG.md
          deno eval "const p='packages/cli/deno.json';const j=JSON.parse(Deno.readTextFileSync(p));j.version='${NEXT}'.replace(/^v/,'');Deno.writeTextFileSync(p, JSON.stringify(j, null, 2) + '\n');"
      - name: Open/update Release PR
        if: steps.next.outputs.version != steps.current.outputs.tag
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.RELEASE_PAT }}
          branch: release/next
          title: "chore(release): ${{ steps.next.outputs.version }}"
          commit-message: "chore(release): ${{ steps.next.outputs.version }}"
          body: "Automated release PR. Merging tags and publishes ${{ steps.next.outputs.version }}."
          add-paths: |
            CHANGELOG.md
            packages/cli/deno.json
  # Runs on every push to main. Idempotent and merge-strategy independent: it
  # pushes a version tag only when packages/cli/deno.json holds a version that is
  # not yet tagged (i.e. right after a Release PR merges the bump). Feature merges
  # leave the version already-tagged, so this is a no-op for them. The tag push
  # (via RELEASE_PAT) triggers release.yml, which builds and publishes the release
  # with its assets — kept there so all assets attach to a draft before publish,
  # which is required because published releases are immutable.
  tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Read version
        id: v
        run: echo "version=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('packages/cli/deno.json')).version)")" >> "$GITHUB_OUTPUT"
      - name: Tag if the version is new
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "v${VERSION} already tagged; nothing to release."
            exit 0
          fi
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
