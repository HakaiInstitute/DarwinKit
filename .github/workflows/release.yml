name: release
# Triggered by the version tag that tag-release pushes (release-pr.yml). Building
# and creating the release live here so all assets are attached to a DRAFT and
# then published in one flow — required because published releases are immutable
# (see the publish job).
on:
  push:
    tags: ["v[0-9]*"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: darwin-arm64
          - runner: ubuntu-latest
            target: linux-x86_64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
          - runner: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Compile
        run: deno task compile:${{ matrix.target }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dwkit-${{ matrix.target }}
          path: packages/cli/dist/dwkit-${{ matrix.target }}*
          if-no-files-found: error

  publish:
    needs: build
    # Only a real tag push has a version to publish. workflow_dispatch runs build
    # as a "do all four targets still compile?" smoke test and stops here.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Gather built binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Flatten artifacts into dist/
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist
      - name: Resolve release facts
        id: rel
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          case "$VERSION" in *-*) echo "prerelease=true" ;; *) echo "prerelease=false" ;; esac >> "$GITHUB_OUTPUT"
          echo "released=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Generate manifest.json, SHA256SUMS, index.json
        env:
          DIST_DIR: dist
          OUT_DIR: out
          VERSION: ${{ steps.rel.outputs.version }}
          RELEASED: ${{ steps.rel.outputs.released }}
          PRERELEASE: ${{ steps.rel.outputs.prerelease }}
          BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.rel.outputs.version }}
          INDEX_URL: https://hakaiinstitute.github.io/DarwinKit/index.json
        run: |
          deno run --allow-read --allow-write --allow-env --allow-net scripts/release/generate.ts
          cp out/manifest.json out/SHA256SUMS dist/
      - name: Generate release notes
        run: docker run --rm -v "$PWD":/app -w /app ghcr.io/orhun/git-cliff/git-cliff:2.13.1 --latest --strip all > NOTES.md
      - name: Create the release with its assets, then publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          PRERELEASE: ${{ steps.rel.outputs.prerelease }}
        run: |
          # Published releases are immutable — assets and target_commitish are
          # sealed and cannot change afterward. So create a DRAFT (mutable),
          # upload every asset, then flip to published, which seals the release
          # WITH its assets. (Updating an already-published immutable release,
          # e.g. to attach binaries later, is rejected by the API.)
          PRE_FLAG=""
          [ "$PRERELEASE" = "true" ] && PRE_FLAG="--prerelease"
          gh release create "$TAG" --draft --title "$TAG" --notes-file NOTES.md $PRE_FLAG
          gh release upload "$TAG" \
            dist/dwkit-darwin-arm64 \
            dist/dwkit-linux-x86_64 \
            dist/dwkit-linux-arm64 \
            dist/dwkit-windows-x86_64.exe \
            dist/SHA256SUMS \
            dist/manifest.json --clobber
          gh release edit "$TAG" --draft=false
      - name: Stage index.json for Pages
        run: |
          mkdir -p site
          cp out/index.json site/index.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  smoke:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
          - runner: ubuntu-latest
          - runner: ubuntu-24.04-arm
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Install & verify (unix)
        if: runner.os != 'Windows'
        env:
          DWKIT_VERSION: ${{ github.ref_name }}
        run: |
          sh install.sh
          expected="${DWKIT_VERSION#v}"
          actual="$("$HOME/.local/bin/dwkit" --version)"
          echo "expected=$expected actual=$actual"
          [ "$actual" = "$expected" ] || { echo "version mismatch"; exit 1; }
      - name: Install & verify (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DWKIT_VERSION: ${{ github.ref_name }}
        run: |
          ./install.ps1
          $expected = $env:DWKIT_VERSION -replace '^v', ''
          $actual = (& "$env:LOCALAPPDATA\Programs\dwkit\dwkit.exe" --version).Trim()
          Write-Host "expected=$expected actual=$actual"
          if ($actual -ne $expected) { throw "version mismatch: $actual != $expected" }

  # Deploy the staged index.json via the GitHub Actions Pages source (no branch).
  # `generate.ts` already fetches the current index and merges the new version in,
  # so publishing site/ as the whole site is complete each run.
  deploy-pages:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Serialize Pages deploys; never cancel an in-flight one mid-publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages (enables the Actions source if not already)
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Deploy index.json to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
