name: release
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: darwin-arm64
          - runner: macos-13
            target: darwin-x86_64
          - runner: ubuntu-latest
            target: linux-x86_64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
          - runner: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Compile
        run: deno task compile:${{ matrix.target }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dwkit-${{ matrix.target }}
          path: packages/cli/dist/dwkit-${{ matrix.target }}*
          if-no-files-found: error

  publish:
    needs: build
    # Only a real published release carries a version tag + prerelease flag.
    # workflow_dispatch runs build as a "do all five targets still compile?" smoke
    # test and stops here — publishing off a branch would mint a broken vmain release.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Gather built binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts into dist/
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;
          ls -la dist
      - name: Resolve release facts
        id: rel
        env:
          TAG: ${{ github.event.release.tag_name || github.ref_name }}
          PRE: ${{ github.event.release.prerelease }}
        run: |
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRE:-false}" >> "$GITHUB_OUTPUT"
          echo "released=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Generate manifest.json, SHA256SUMS, index.json
        env:
          DIST_DIR: dist
          OUT_DIR: out
          VERSION: ${{ steps.rel.outputs.version }}
          RELEASED: ${{ steps.rel.outputs.released }}
          PRERELEASE: ${{ steps.rel.outputs.prerelease }}
          BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.rel.outputs.version }}
          INDEX_URL: https://hakaiinstitute.github.io/DarwinKit/index.json
        run: |
          deno run --allow-read --allow-write --allow-env --allow-net scripts/release/generate.ts
          cp out/manifest.json out/SHA256SUMS dist/
      - name: Attach assets to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dwkit-darwin-arm64
            dist/dwkit-darwin-x86_64
            dist/dwkit-linux-x86_64
            dist/dwkit-linux-arm64
            dist/dwkit-windows-x86_64.exe
            dist/SHA256SUMS
            dist/manifest.json
      - name: Stage index.json for Pages
        run: |
          mkdir -p site
          cp out/index.json site/index.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  smoke:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
          - runner: macos-13
          - runner: ubuntu-latest
          - runner: ubuntu-24.04-arm
          - runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install & verify (unix)
        if: runner.os != 'Windows'
        env:
          DWKIT_VERSION: ${{ github.event.release.tag_name }}
        run: |
          sh install.sh
          expected="${DWKIT_VERSION#v}"
          actual="$("$HOME/.local/bin/dwkit" --version)"
          echo "expected=$expected actual=$actual"
          [ "$actual" = "$expected" ] || { echo "version mismatch"; exit 1; }
      - name: Install & verify (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DWKIT_VERSION: ${{ github.event.release.tag_name }}
        run: |
          ./install.ps1
          $expected = $env:DWKIT_VERSION -replace '^v', ''
          $actual = (& "$env:LOCALAPPDATA\Programs\dwkit\dwkit.exe" --version).Trim()
          Write-Host "expected=$expected actual=$actual"
          if ($actual -ne $expected) { throw "version mismatch: $actual != $expected" }

  # Deploy the staged index.json via the GitHub Actions Pages source (no branch).
  # `generate.ts` already fetches the current index and merges the new version in,
  # so publishing site/ as the whole site is complete each run.
  deploy-pages:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Serialize Pages deploys; never cancel an in-flight one mid-publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages (enables the Actions source if not already)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy index.json to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
