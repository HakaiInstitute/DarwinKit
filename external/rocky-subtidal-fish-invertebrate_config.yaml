      class: event
      path: ./rocky-subtidal-fish-invertebrate/obis/hakaiFI_event.csv
      description: Marine sampling events for OBIS

    - name: occurrence
      class: occurrence
      path: ./rocky-subtidal-fish-invertebrate/obis/hakaiFI_occ.csv
      description: Marine sampling occurrence for OBIS

    - name: extendedMeasurementOrFact
      class: extendedMeasurementOrFact
      path: ./rocky-subtidal-fish-invertebrate/obis/hakaiFI_eMOF.csv
      description: Marine sampling Extended Measurement Or Fact for OBIS

