    - name: eMOF_BedAbund
      profile: ExtendedMeasurementOrFact
      source:
        density: SELECT * from density where density.density__m2_ is not null
      fields:
        measurementID: concat_ws(':', density.date, density.organization, density.work_area, density.site_id, density.transect_dist_m, density.hakai_id, 'ba')
