    - name: eMOF_PrimaryAlgaeSp
      profile: ExtendedMeasurementOrFact
      source:
        habitat: SELECT * from habitat where sample_collected = TRUE AND habitat.vegetation_1 is not null
      fields:
        measurementID: concat_ws(':', habitat.date, habitat.organization, habitat.work_area, habitat.site_id, habitat.transect_dist_m, habitat.hakai_id, 'pas')
