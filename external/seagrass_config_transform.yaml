        # verbatimIdentification: occ.species_name
        # scientificNameID: occ.lsid
        # taxonomicStatus: occ.taxonomicStatus
        # scientificNameAuthorship: occ.authority
        # kingdom: occ.kingdom
        # phylum: occ.phylum
        # class: occ.class
        # order: occ.order
        # family: occ.family
        # genus: occ.genus
        # recordedBy: occ.diver_name
        # occurrenceStatus: "'present'"
        # individualCount: "'1'"
        # specificEpithet: occ.scientificName[0:2]
        # basisOfRecord: "'HumanObservation'"
        # eventID: concat_ws('-', 'hakaiFI', occ.site, occ.date, 'transect', occ.transect, occ.pass, occ.swath_type)
        # occurrenceID: concat_ws('-',' hakaiFI', occ.site, occ.date, 'transect', occ.transect, occ.pass, occ.swath_type, 'occ', occ.rn)

    - name: eMOF_SubstrateTypeA
      profile: ExtendedMeasurementOrFact
      source:
        habitat: SELECT * from habitat where sample_collected = TRUE AND split_part(habitat.substrate,',',1) is not null
      fields:
        measurementID: concat_ws(':', habitat.date, habitat.organization, habitat.work_area, habitat.site_id, habitat.transect_dist_m, habitat.hakai_id, 'ssa')
        eventID: concat_ws(':', habitat.date, habitat.organization, habitat.work_area, habitat.site_id, habitat.transect_dist_m)
        measurementType: "'SubstrateTypeA'"
        measurementTypeID: null
        measurementValue: split_part(habitat.substrate,',',1)
        measurementValueID: null
        measurementUnit: "''"
        measurementUnitID: "''"
        measurementDeterminedDate: habitat.date
        occurrenceID: concat_ws(':', habitat.date, habitat.organization, habitat.work_area, habitat.site_id, habitat.transect_dist_m, habitat.hakai_id)
        measurementMethod: "''"

    - name: eMOF_SubstrateTypeB
      profile: ExtendedMeasurementOrFact
