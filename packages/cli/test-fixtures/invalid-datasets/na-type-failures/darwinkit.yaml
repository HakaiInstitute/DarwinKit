id: na-type-failures-test-fixture
name: Invalid Dataset - NA Type Failures
version: 1.0.0
description: Test dataset with NA values that should cause validation failures (NA intentionally not in nullValues list)
createdAt: '2024-01-01T00:00:00.000Z'
updatedAt: '2025-01-22T00:00:00.000Z'
standard: obis
validation:
